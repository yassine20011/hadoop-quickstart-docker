version: 2

project_name: hadoop-dev

before:
  hooks:
    - go mod tidy -C hadoop-dev

builds:
  - id: hadoop-dev
    dir: hadoop-dev
    main: .
    binary: hadoop-dev
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X hadoop-dev/cmd.Version={{.Version}}
      - -X hadoop-dev/cmd.Commit={{.Commit}}
      - -X hadoop-dev/cmd.Date={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

extra_files:
  - glob: "install.sh"
  - glob: "install.ps1"

release:
  draft: true
  prerelease: auto
  name_template: "v{{.Version}}"
  extra_files:
    - glob: "install.sh"
    - glob: "install.ps1"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
