networks:
  hadoop:
    driver: bridge

services:
  namenode:
    image: bde2020/hadoop-base:2.0.0-hadoop3.2.1-java8
    container_name: hadoop-namenode
    hostname: namenode
    networks:
      - hadoop
    env_file:
      - ./hadoop.env
    ports:
      - "9870:9870"
      - "8088:8088"
      - "19888:19888"
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      START_LOCAL_DATANODE: "false"
    volumes:
      - ./shared:/shared
      - ./data/nn:/tmp/hadoop-root
      - ./history/.bash_history:/root/.bash_history
    command:
      - bash
      - /shared/compose-namenode.sh

  postgres:
    image: bde2020/hive-metastore-postgresql:2.3.0
    container_name: postgres
    hostname: postgres
    profiles: ["hive"]
    networks:
      - hadoop
    environment:
      POSTGRES_DB: hive
    volumes:
      - ./data/hive/postgresql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "psql -U postgres -d metastore -c 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-metastore
    hostname: hive-metastore
    profiles: ["hive"]
    networks:
      - hadoop
    depends_on:
      namenode:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file:
      - ./hadoop.env
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      HIVE_SITE_CONF_hive_metastore_uris: thrift://hive-metastore:9083
      HIVE_SITE_CONF_javax_jdo_option_ConnectionURL: jdbc:postgresql://postgres:5432/metastore
      HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName: org.postgresql.Driver
      HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName: hive
      HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword: hive
      SERVICE_PRECONDITION: namenode:9870 postgres:5432
    volumes:
      - ./shared:/shared
    command:
      - bash
      - /shared/start-hive-metastore.sh
    ports:
      - "9083:9083"

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-server
    hostname: hive-server
    profiles: ["hive"]
    networks:
      - hadoop
    depends_on:
      namenode:
        condition: service_started
      hive-metastore:
        condition: service_started
    env_file:
      - ./hadoop.env
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      HIVE_SITE_CONF_hive_metastore_uris: thrift://hive-metastore:9083
      HIVE_SITE_CONF_javax_jdo_option_ConnectionURL: jdbc:postgresql://postgres:5432/metastore
      HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName: org.postgresql.Driver
      HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName: hive
      HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword: hive
      SERVICE_PRECONDITION: namenode:9870 hive-metastore:9083
    ports:
      - "10000:10000"
      - "10002:10002"

  hbase-master:
    image: bde2020/hbase-master:1.0.0-hbase1.2.6
    container_name: hbase-master
    hostname: hbase-master
    profiles: ["hbase"]
    networks:
      - hadoop
    depends_on:
      namenode:
        condition: service_started
    environment:
      HBASE_CONF_hbase_rootdir: hdfs://namenode:8020/hbase
      HBASE_CONF_hbase_zookeeper_quorum: hbase-master
      HBASE_CONF_hbase_zookeeper_property_dataDir: /tmp/zookeeper
      SERVICE_PRECONDITION: "namenode:9870"
      JAVA_OPTS: "-Xmx512m"
    ports:
      - "16010:16010"
      - "16000:16000"
      - "2181:2181"

  hbase-regionserver:
    image: bde2020/hbase-regionserver:1.0.0-hbase1.2.6
    container_name: hbase-regionserver
    hostname: hbase-regionserver
    profiles: ["hbase"]
    networks:
      - hadoop
    depends_on:
      hbase-master:
        condition: service_started
    environment:
      HBASE_CONF_hbase_rootdir: hdfs://namenode:8020/hbase
      HBASE_CONF_hbase_zookeeper_quorum: hbase-master
      HBASE_CONF_hbase_regionserver_hostname: hbase-regionserver
      SERVICE_PRECONDITION: "hbase-master:16010"
      JAVA_OPTS: "-Xmx512m"
    ports:
      - "16030:16030"
      - "16020:16020"
